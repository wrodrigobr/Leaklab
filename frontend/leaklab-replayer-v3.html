<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LeakLab Replayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rp-felt:  #1a4a2e;
  --rp-felt2: #245c38;
  --rp-rail:  #3d1f0a;
  --rp-rail2: #5a2e0e;
  --rp-gold:  #c9a84c;
  --rp-gold2: #e8c96a;
  --rp-red:   #c94040;
  --rp-green: #4caf7d;
  --rp-ink:   #0d1117;
  --rp-bg:    #111318;
  --rp-card:  #161b22;
  --rp-brd:   #2d333b;
  --rp-text:  #e8e6df;
  --rp-muted: #8a8680;
  --rp-dim:   #5a5652;
}
html,body{width:100%;height:100%;background:var(--rp-bg);color:var(--rp-text);
  font-family:'Rajdhani',sans-serif;overflow:hidden}

/* ── Layout ── */
.rp-wrap{display:flex;flex-direction:column;height:100vh;padding:10px 14px 10px}
.rp-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-shrink:0}
.rp-logo{font-size:.72rem;font-weight:700;color:var(--rp-gold);letter-spacing:.14em;
  font-family:'Share Tech Mono',monospace}
.rp-hand{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--rp-dim)}
.rp-close{margin-left:auto;background:none;border:1px solid var(--rp-brd);
  color:var(--rp-muted);padding:3px 12px;border-radius:4px;cursor:pointer;
  font-size:.65rem;font-family:'Share Tech Mono',monospace;transition:.15s}
.rp-close:hover{border-color:var(--rp-gold);color:var(--rp-gold)}

/* ── Table ── */
.rp-table{flex:1;min-height:0;position:relative}
.rp-table svg{width:100%;height:100%;display:block}

/* ── Controls ── */
.rp-ctrl{flex-shrink:0;background:var(--rp-card);border:1px solid var(--rp-brd);
  border-radius:8px;padding:10px 14px;margin-top:8px}
.rp-timeline{width:100%;height:4px;background:var(--rp-brd);border-radius:2px;
  margin-bottom:10px;position:relative;cursor:pointer}
.rp-progress{height:100%;background:var(--rp-gold);border-radius:2px;transition:width .15s}
.rp-dots{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.rp-dot{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--rp-dim);
  transform:translate(-50%,-50%);top:50%;cursor:pointer;pointer-events:all}
.rp-dot.err{background:var(--rp-red);width:9px;height:9px}
.rp-dot.hero{background:var(--rp-gold)}

.rp-btns{display:flex;align-items:center;gap:8px}
.rp-btn{background:var(--rp-card);border:1px solid var(--rp-brd);color:var(--rp-text);
  width:34px;height:34px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:.85rem;transition:.15s;flex-shrink:0}
.rp-btn:hover{border-color:var(--rp-gold);color:var(--rp-gold)}
.rp-btn.play{width:42px;height:42px;font-size:1rem;border-color:var(--rp-gold);color:var(--rp-gold)}
.rp-btn.play:hover{background:var(--rp-gold);color:#000}
.rp-speed{background:var(--rp-card);border:1px solid var(--rp-brd);color:var(--rp-muted);
  padding:5px 8px;border-radius:6px;font-family:'Share Tech Mono',monospace;
  font-size:.65rem;cursor:pointer}
.rp-log{margin-left:auto;text-align:right;font-family:'Share Tech Mono',monospace;font-size:.65rem}
.rp-log-street{color:var(--rp-gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.rp-log-action{color:var(--rp-text)}
.rp-log-action.err{color:var(--rp-red);font-weight:700}

/* ── Street badge ── */
.rp-badge{position:absolute;top:6px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);border:1px solid var(--rp-gold);border-radius:20px;
  padding:2px 14px;font-family:'Share Tech Mono',monospace;font-size:.6rem;
  color:var(--rp-gold);letter-spacing:.14em;pointer-events:none;opacity:0;transition:.3s}
.rp-badge.show{opacity:1}

/* ── Error popup ── */
.rp-err-pop{position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#1a0808;
  border:1px solid var(--rp-red);border-radius:8px;padding:10px 14px;
  width:230px;z-index:20;display:none;font-size:.72rem}
.rp-err-pop.show{display:block;animation:rpPop .2s ease}
.rp-err-title{color:var(--rp-red);font-weight:700;font-size:.78rem;margin-bottom:4px}
.rp-err-body{color:#d4a0a0;line-height:1.5}
.rp-err-best{margin-top:6px;color:var(--rp-green);font-weight:600}
@keyframes rpPop{from{opacity:0;transform:translateX(-50%) scale(.9)}to{opacity:1;transform:translateX(-50%) scale(1)}}
</style>
</head>
<body>
<div class="rp-wrap">
  <div class="rp-hdr">
    <span class="rp-logo">▷ LEAKLAB</span>
    <span class="rp-hand" id="rp-hand-id">Mão #---</span>
    <button class="rp-close" onclick="window.close()">✕ Fechar</button>
  </div>

  <div class="rp-table" id="rp-table">
    <div class="rp-badge" id="rp-badge"></div>
    <div class="rp-err-pop" id="rp-err-pop">
      <div class="rp-err-title">⚠ Erro detectado</div>
      <div class="rp-err-body" id="rp-err-body"></div>
      <div class="rp-err-best" id="rp-err-best"></div>
    </div>
    <svg id="rp-svg" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="rp-felt-g" cx="50%" cy="42%" r="54%">
          <stop offset="0%" stop-color="#27663e"/>
          <stop offset="100%" stop-color="#1a4a2e"/>
        </radialGradient>
        <radialGradient id="rp-rail-g" cx="50%" cy="28%" r="62%">
          <stop offset="0%" stop-color="#5c3010"/>
          <stop offset="100%" stop-color="#271508"/>
        </radialGradient>
        <filter id="rp-shadow">
          <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity=".7"/>
        </filter>
      </defs>

      <!-- Sombra -->
      <ellipse cx="450" cy="262" rx="422" ry="233" fill="#00000060" filter="url(#rp-shadow)"/>
      <!-- Rail externo -->
      <ellipse cx="450" cy="252" rx="420" ry="230" fill="url(#rp-rail-g)"/>
      <ellipse cx="450" cy="252" rx="420" ry="230" fill="none" stroke="#7a4018" stroke-width="1.5"/>
      <ellipse cx="450" cy="252" rx="420" ry="230" fill="none" stroke="#2a1005" stroke-width="7"/>
      <!-- Borda interna do rail -->
      <ellipse cx="450" cy="252" rx="368" ry="192" fill="none" stroke="#6a3515" stroke-width="1"/>
      <ellipse cx="450" cy="252" rx="368" ry="192" fill="none" stroke="#2a1005" stroke-width="4"/>
      <!-- Felt -->
      <ellipse cx="450" cy="252" rx="365" ry="189" fill="url(#rp-felt-g)"/>
      <ellipse cx="450" cy="252" rx="365" ry="189" fill="none" stroke="#1e5530" stroke-width="8"/>
      <ellipse cx="450" cy="252" rx="353" ry="177" fill="none" stroke="#2a6b3e" stroke-width=".8"/>
      <!-- Watermark -->
      <text x="450" y="258" text-anchor="middle" fill="#ffffff04"
            font-family="Rajdhani,sans-serif" font-size="50" font-weight="700" letter-spacing="10">LEAKLAB</text>

      <!-- Board area -->
      <rect x="284" y="217" width="332" height="66" rx="8"
            fill="#00000028" stroke="#2a6b3e" stroke-width="1"/>
      <text x="450" y="210" text-anchor="middle" fill="#c9a84c44"
            font-family="Share Tech Mono,monospace" font-size="9" letter-spacing=".12em">COMMUNITY CARDS</text>

      <!-- Board cards (dinâmico) -->
      <g id="rp-board"></g>

      <!-- Pot -->
      <g id="rp-pot">
        <rect x="376" y="163" width="148" height="26" rx="13" fill="#00000055" stroke="#c9a84c44" stroke-width="1"/>
        <text x="410" y="180" text-anchor="middle" fill="#c9a84c77"
              font-family="Share Tech Mono,monospace" font-size="8.5" letter-spacing=".1em">POT</text>
        <text id="rp-pot-val" x="460" y="180" text-anchor="middle" fill="#c9a84c"
              font-family="Share Tech Mono,monospace" font-size="14" font-weight="bold"></text>
      </g>

      <!-- Seats (dinâmico) -->
      <g id="rp-seats"></g>
      <!-- Chips (dinâmico) -->
      <g id="rp-chips"></g>
    </svg>
  </div>

  <div class="rp-ctrl">
    <div class="rp-timeline" id="rp-tl" onclick="rpSeekClick(event)">
      <div class="rp-progress" id="rp-prog" style="width:0%"></div>
      <div class="rp-dots" id="rp-dots"></div>
    </div>
    <div class="rp-btns">
      <button class="rp-btn" onclick="rpBack()" title="← Voltar">◀◀</button>
      <button class="rp-btn play" id="rp-play" onclick="rpToggle()">▶</button>
      <button class="rp-btn" onclick="rpFwd()" title="Avançar →">▶▶</button>
      <select class="rp-speed" id="rp-spd" onchange="rpSpeed=+this.value">
        <option value="2000">0.5×</option>
        <option value="1300" selected>1×</option>
        <option value="750">1.5×</option>
        <option value="420">2×</option>
        <option value="160">3×</option>
      </select>
      <div class="rp-log">
        <div class="rp-log-street" id="rp-log-st">PREFLOP</div>
        <div class="rp-log-action" id="rp-log-ac">Início da mão</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Helpers de carta ──────────────────────────────────────────────────────────
const SUIT_SYM   = {s:'♠',h:'♥',d:'♦',c:'♣'};
const SUIT_COLOR = {s:'#1a1a1a',h:'#cc2222',d:'#cc2222',c:'#1a1a1a'};

function cardSVG(code, x, y, w=38, h=52, faceDown=false){
  if(!code || faceDown){
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4"
                  fill="#1c2d3d" stroke="#2a4a6a" stroke-width=".8"/>
            <text x="${x+w/2}" y="${y+h/2+5}" text-anchor="middle"
                  fill="#2a4a6a" font-size="16" font-family="Rajdhani,sans-serif">?</text>`;
  }
  const rank = code.slice(0,-1).toUpperCase();
  const suit = code.slice(-1).toLowerCase();
  const col  = SUIT_COLOR[suit] || '#1a1a1a';
  const sym  = SUIT_SYM[suit]   || suit;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4"
                fill="#f4efe6" stroke="#d0c8b8" stroke-width=".5"/>
          <text x="${x+4}" y="${y+13}" fill="${col}"
                font-family="Rajdhani,sans-serif" font-size="13" font-weight="700">${rank}</text>
          <text x="${x+4}" y="${y+24}" fill="${col}"
                font-family="Rajdhani,sans-serif" font-size="11">${sym}</text>
          <text x="${x+w/2}" y="${y+h/2+10}" text-anchor="middle" fill="${col}"
                font-family="Rajdhani,sans-serif" font-size="20" opacity=".18">${sym}</text>
          <text x="${x+w-4}" y="${y+h-5}" text-anchor="end" fill="${col}"
                font-family="Rajdhani,sans-serif" font-size="13" font-weight="700">${rank}</text>`;
}

function chipSVG(x, y, amount, bb){
  const bb_val = bb || 100;
  const col = amount >= bb_val*20 ? '#c9a84c' : amount >= bb_val*5 ? '#c94040' : '#3a7ec9';
  const r   = 13;
  const fmt = amount >= 1000 ? (amount/1000).toFixed(1)+'k' : String(Math.round(amount));
  return `<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" stroke="#ffffff28" stroke-width="1.5"/>
          <circle cx="${x}" cy="${y}" r="${r-3}" fill="none" stroke="#ffffff18" stroke-width="1" stroke-dasharray="3 3"/>
          <text x="${x}" y="${y+4}" text-anchor="middle" fill="#fff"
                font-family="Share Tech Mono,monospace" font-size="8.5" font-weight="bold">${fmt}</text>`;
}

// ── Layout de seats (dinâmico, congelado) ─────────────────────────────────────
const CX=450, CY=252, RX=365, RY=189;
let _rpLayout = null;

function rpBuildLayout(seatNums){
  if(_rpLayout) return _rpLayout;
  const n = seatNums.length;
  _rpLayout = {};
  seatNums.forEach((s, i) => {
    const ang = (-90 + (360/n)*i) * Math.PI/180;
    const x   = Math.round(CX + RX*Math.cos(ang));
    const y   = Math.round(CY + RY*Math.sin(ang));
    const a   = ((-90 + (360/n)*i) % 360 + 360) % 360;
    let dir;
    if(a>=315 || a<45)  dir='top';
    else if(a<135)       dir='bottom';
    else if(a<225)       dir='left';
    else                 dir='top';
    _rpLayout[s] = {x, y, dir};
  });
  return _rpLayout;
}

// ── Estado do replayer ─────────────────────────────────────────────────────────
let REPLAY=null, rpStep=0, rpPlaying=false, rpTimer=null, rpSpeed=1300;
let rpShowBB=true;  // toggle chips: true=BB, false=fichas

// ── Render ────────────────────────────────────────────────────────────────────
function rpRender(step){
  if(!REPLAY || step<0 || step>=REPLAY.timeline.length) return;
  const ev = REPLAY.timeline[step];
  const bb = REPLAY.bb || 100;

  // Progress
  const pct = REPLAY.timeline.length>1 ? (step/(REPLAY.timeline.length-1))*100 : 0;
  document.getElementById('rp-prog').style.width = pct+'%';

  // Street badge
  if(ev.type==='street'){
    const badge=document.getElementById('rp-badge');
    badge.textContent=ev.street.toUpperCase();
    badge.className='rp-badge show';
    setTimeout(()=>badge.className='rp-badge',1600);
  }

  // Log
  document.getElementById('rp-log-st').textContent=(ev.street||'preflop').toUpperCase();
  const logAc=document.getElementById('rp-log-ac');
  if(ev.is_error){
    logAc.textContent='⚠ '+ev.desc;
    logAc.className='rp-log-action err';
  } else {
    logAc.textContent=ev.desc||'—';
    logAc.className='rp-log-action';
  }

  // Pot
  const pot=ev.pot||0;
  const fmtBB = (v, bb) => {
    const bbs = v / bb;
    return (bbs < 1 ? bbs.toFixed(1) : Math.round(bbs)) + 'BB';
  };
  const fmtChips = (v) => v>=1000 ? (v/1000).toFixed(1)+'k' : Math.round(v)+'';
  const potStr = rpShowBB ? fmtBB(pot, bb) : fmtChips(pot);
  document.getElementById('rp-pot-val').textContent = pot>0 ? potStr : '';

  // Board
  rpRenderBoard(ev.board||[], step);

  // Seats
  rpRenderSeats(ev, bb);

  // Error popup
  const popup=document.getElementById('rp-err-pop');
  if(ev.is_error && ev.is_hero){
    const labels={clear_mistake:'ERRO GRAVE',small_mistake:'Erro',marginal:'Marginal'};
    document.getElementById('rp-err-body').textContent=
      'Você fez '+ev.action+' — penalidade: '+ev.error_score;
    document.getElementById('rp-err-best').textContent=
      '✓ Ação correta: '+ev.best_action;
    popup.querySelector('.rp-err-title').textContent=
      '⚠ '+(labels[ev.error_label]||'Atenção');
    popup.classList.add('show');
    setTimeout(()=>popup.classList.remove('show'), 4500);
  } else {
    popup.classList.remove('show');
  }
}

function rpRenderBoard(cards, step){
  const g = document.getElementById('rp-board');
  g.innerHTML='';
  const sx=292, y=222, W=42, H=56, GAP=6;
  for(let i=0;i<5;i++){
    const x=sx+i*(W+GAP);
    if(i<cards.length) g.innerHTML+=cardSVG(cards[i],x,y,W,H);
    else g.innerHTML+=`<rect x="${x}" y="${y}" width="${W}" height="${H}" rx="4"
      fill="#00000028" stroke="#1e5530" stroke-width="1" stroke-dasharray="4 3"/>`;
  }
}

// Contador de players para anonimização (mantém mapeamento estável)
let _playerMap = {};
let _playerCount = 0;
function playerLabel(name, hero){
  if(name===hero) return hero;
  if(!_playerMap[name]){
    _playerCount++;
    _playerMap[name] = 'Player '+_playerCount;
  }
  return _playerMap[name];
}

function rpRenderSeats(ev, bb){
  const seatsG=document.getElementById('rp-seats');
  const chipsG=document.getElementById('rp-chips');
  seatsG.innerHTML='';
  chipsG.innerHTML='';

  const seatNums = Object.keys(ev.seats).map(Number).sort((a,b)=>a-b);
  const layout   = rpBuildLayout(seatNums);
  const bw=96, bh=48;

  seatNums.forEach(sn=>{
    const d      = ev.seats[sn];
    const pos    = layout[sn];
    if(!pos) return;
    const isHero   = d.player===ev.hero;
    const isBtn    = sn===ev.button;
    const isFolded = (ev.folded||[]).includes(d.player);
    const isActive = ev.type==='action' && ev.seat===sn;
    const opacity  = isFolded ? 0.32 : 1;
    const bx=pos.x-bw/2, by=pos.y-bh/2;
    const dir=pos.dir;

    // Cores do seat
    let bg='#161b22', bd='#2d333b', bdW=1;
    if(isHero)   {bg='#0d2818';bd='#4caf7d';bdW=1.5;}
    if(isActive) {bg='#1c1e08';bd='#c9a84c';bdW=2;}
    if(isActive && ev.is_error && ev.is_hero){bg='#2a0808';bd='#c94040';bdW=2;}

    let html=`<g opacity="${opacity}">`;

    // Cartas — apontam para fora da mesa conforme dir
    const cw=26,ch=36,cg=3;
    const showHeroCards = isHero && ev.hero_cards && ev.hero_cards.length===2;
    if(showHeroCards){
      const cx1=pos.x-cw-cg/2, cy1=by-ch-5;
      const cx2=pos.x+cg/2,    cy2=by-ch-5;
      html+=cardSVG(ev.hero_cards[0],cx1,cy1,cw,ch);
      html+=cardSVG(ev.hero_cards[1],cx2,cy2,cw,ch);
    } else if(!isHero && !isFolded){
      const sw=18,sh=26;
      const cx1=pos.x-sw-2, cy1=by-sh-4;
      const cx2=pos.x+2,    cy2=by-sh-4;
      html+=cardSVG(null,cx1,cy1,sw,sh,true);
      html+=cardSVG(null,cx2,cy2,sw,sh,true);
    }

    // Seat box
    html+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="6"
                 fill="${bg}" stroke="${bd}" stroke-width="${bdW}"/>`;

    // Badge de posição
    if(d.pos){
      const pc={BTN:'#c9a84c',BB:'#c94040',SB:'#d4763a'}[d.pos]||'#3a5a7a';
      html+=`<rect x="${bx+2}" y="${by+2}" width="26" height="13" rx="3"
                   fill="${pc}22" stroke="${pc}55" stroke-width=".5"/>
             <text x="${bx+15}" y="${by+11}" text-anchor="middle" fill="${pc}"
                   font-family="Share Tech Mono,monospace" font-size="7.5">${d.pos}</text>`;
    }

    // Nome: hero=nickname real, outros=Player N
    const label = playerLabel(d.player, ev.hero);
    html+=`<text x="${pos.x}" y="${by+24}" text-anchor="middle"
                 fill="${isHero?'#4caf7d':'#d8d4cc'}"
                 font-family="Rajdhani,sans-serif" font-size="12"
                 font-weight="${isHero?700:500}">${label}</text>`;

    // Stack: BB ou chips (toggle)
    const stackVal = (ev.stacks&&ev.stacks[sn]!=null) ? ev.stacks[sn] : d.stack;
    let stackStr;
    if(rpShowBB){
      const sbb = stackVal/bb;
      stackStr = (sbb < 1 ? sbb.toFixed(1) : Math.round(sbb)) + 'BB';
    } else {
      stackStr = stackVal>=1000 ? (stackVal/1000).toFixed(1)+'k' : Math.round(stackVal)+'';
    }
    html+=`<text x="${pos.x}" y="${by+38}" text-anchor="middle"
                 fill="${isHero?'#4caf7d88':'#6a6660'}"
                 font-family="Share Tech Mono,monospace" font-size="9">${stackStr}</text>`;

    // Dealer button
    if(isBtn){
      html+=`<circle cx="${bx+bw-5}" cy="${by+5}" r="8" fill="#c9a84c"/>
             <text x="${bx+bw-5}" y="${by+9}" text-anchor="middle"
                   fill="#000" font-family="Rajdhani,sans-serif" font-size="7.5" font-weight="700">D</text>`;
    }

    // Label de ação
    if(isActive && ev.action){
      const ac={folds:'#c94040',calls:'#4caf7d',raises:'#c9a84c',
                bets:'#c9a84c',checks:'#6a6660','all-in':'#ff7777'}[ev.action]||'#6a6660';
      const amtBBs = ev.amount/bb;
      const amtStr = ev.amount>0
        ? (rpShowBB
            ? (amtBBs < 1 ? amtBBs.toFixed(1) : Math.round(amtBBs)) + 'BB'
            : Math.round(ev.amount)+'')
        : '';
      const actLabel = ev.action.toUpperCase()+(amtStr?' '+amtStr:'');
      html+=`<rect x="${pos.x-30}" y="${by+bh+3}" width="60" height="15" rx="3"
                   fill="${ac}22" stroke="${ac}66" stroke-width=".5"/>
             <text x="${pos.x}" y="${by+bh+13}" text-anchor="middle"
                   fill="${ac}" font-family="Share Tech Mono,monospace" font-size="8">${actLabel}</text>`;
    }

    html+='</g>';
    seatsG.innerHTML+=html;

    // Ficha de aposta
    const bet = ev.bets&&ev.bets[sn]>0 ? ev.bets[sn] : 0;
    if(bet>0){
      const cx2=pos.x+(CX-pos.x)*0.42;
      const cy2=pos.y+(CY-pos.y)*0.42;
      const bbs = bet/bb;
      const betStr = rpShowBB
        ? (bbs < 1 ? bbs.toFixed(1) : Math.round(bbs)) + 'BB'
        : bet>=1000?(bet/1000).toFixed(1)+'k':Math.round(bet)+'';
      chipsG.innerHTML+=`<circle cx="${cx2}" cy="${cy2}" r="15"
        fill="${bet>=bb*10?'#c9a84c':bet>=bb*3?'#c94040':'#3a7ec9'}"
        stroke="#ffffff28" stroke-width="1.5"/>
        <circle cx="${cx2}" cy="${cy2}" r="10" fill="none"
          stroke="#ffffff18" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="${cx2}" y="${cy2+4}" text-anchor="middle" fill="#fff"
          font-family="Share Tech Mono,monospace" font-size="8" font-weight="bold">${betStr}</text>`;
    }
  });
}

// ── Controles ─────────────────────────────────────────────────────────────────
function rpToggle(){
  rpPlaying=!rpPlaying;
  document.getElementById('rp-play').textContent=rpPlaying?'⏸':'▶';
  if(rpPlaying) rpPlayNext(); else clearTimeout(rpTimer);
}
function rpPlayNext(){
  if(!rpPlaying) return;
  if(rpStep>=REPLAY.timeline.length-1){
    rpPlaying=false;
    document.getElementById('rp-play').textContent='▶';
    return;
  }
  rpStep++;
  rpRender(rpStep);
  const ev=REPLAY.timeline[rpStep];
  const delay=ev.is_error?rpSpeed*2.5:rpSpeed;
  rpTimer=setTimeout(rpPlayNext,delay);
}
function rpFwd(){
  clearTimeout(rpTimer);rpPlaying=false;
  document.getElementById('rp-play').textContent='▶';
  if(rpStep<REPLAY.timeline.length-1){rpStep++;rpRender(rpStep);}
}
function rpBack(){
  clearTimeout(rpTimer);rpPlaying=false;
  document.getElementById('rp-play').textContent='▶';
  if(rpStep>0){rpStep--;rpRender(rpStep);}
}
function rpSeekTo(s){
  clearTimeout(rpTimer);rpPlaying=false;
  document.getElementById('rp-play').textContent='▶';
  rpStep=s;rpRender(s);
}
function rpSeekClick(e){
  const bar=document.getElementById('rp-tl');
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  rpSeekTo(Math.round(pct*(REPLAY.timeline.length-1)));
}

// Toggle BB ↔ chips ao clicar no pot ou nos stacks
document.addEventListener('click', e=>{
  const svg=document.getElementById('rp-svg');
  if(svg&&svg.contains(e.target)){
    rpShowBB=!rpShowBB;
    rpRender(rpStep);
  }
});

// Teclado
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') rpFwd();
  if(e.key==='ArrowLeft')  rpBack();
  if(e.key===' '){e.preventDefault();rpToggle();}
  if(e.key==='b') {rpShowBB=!rpShowBB;rpRender(rpStep);}
});

// ── Init ──────────────────────────────────────────────────────────────────────
function initReplayer(data){
  REPLAY=data; rpStep=0; _rpLayout=null;
  _playerMap={}; _playerCount=0;

  document.getElementById('rp-hand-id').textContent='Mão #'+String(data.hand_id).slice(-8);

  // Dots na timeline
  const dotsEl=document.getElementById('rp-dots');
  dotsEl.innerHTML='';
  data.timeline.forEach((ev,i)=>{
    const pct=data.timeline.length>1?(i/(data.timeline.length-1))*100:0;
    let cls='rp-dot';
    if(ev.is_error)    cls+=' err';
    else if(ev.is_hero) cls+=' hero';
    dotsEl.innerHTML+=`<div class="${cls}" style="left:${pct}%" title="${ev.desc||''}" onclick="rpSeekTo(${i})"></div>`;
  });

  rpRender(0);
}

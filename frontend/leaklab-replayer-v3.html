<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LeakLab Replayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rp-red:#e52020;--rp-green:#3aaa52;--rp-gold:#c9a840;
  --rp-muted:#777;--rp-ctrl:#090909;
}
html,body{
  width:100%;height:100%;
  background:radial-gradient(ellipse at 50% 38%,#14213a 0%,#060d18 100%);
  color:#f0ede8;font-family:'Inter',sans-serif;overflow:hidden
}
.rp-wrap{display:flex;flex-direction:column;height:100vh}

/* ── Header ── */
.rp-hdr{
  display:flex;align-items:center;gap:10px;padding:7px 16px;
  background:rgba(0,0,0,.6);border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;z-index:10
}
.rp-logo{font-size:.72rem;font-weight:800;color:#f0f0f0;letter-spacing:.2em;
  font-family:'Share Tech Mono',monospace}
.rp-logo span{color:var(--rp-green)}
.rp-hand{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--rp-muted)}
.rp-close{margin-left:auto;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);color:var(--rp-muted);
  padding:4px 14px;border-radius:4px;cursor:pointer;
  font-size:.65rem;font-family:'Share Tech Mono',monospace;transition:.15s}
.rp-close:hover{border-color:#fff;color:#fff}

/* ── Table area with 3D perspective ── */
.rp-table{
  flex:1;min-height:0;position:relative;
  perspective:1100px;perspective-origin:50% -5%;
  overflow:hidden
}
.rp-persp{
  position:absolute;inset:-8% -4%;
  transform:rotateX(9deg);
  transform-origin:50% 60%;
}
#rp-svg{width:100%;height:100%;display:block}

/* Street badge */
.rp-badge{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);border:1px solid var(--rp-gold);border-radius:20px;
  padding:3px 18px;font-family:'Share Tech Mono',monospace;font-size:.65rem;
  color:var(--rp-gold);letter-spacing:.16em;pointer-events:none;
  opacity:0;transition:.3s;z-index:20
}
.rp-badge.show{opacity:1}

/* Error popup */
.rp-err-pop{
  position:absolute;bottom:8px;left:50%;
  transform:translateX(-50%);background:#160606;
  border:1px solid var(--rp-red);border-radius:10px;
  padding:12px 16px;width:270px;z-index:30;display:none;font-size:.76rem
}
.rp-err-pop.show{display:block;animation:rpPop .2s ease}
.rp-err-title{color:var(--rp-red);font-weight:700;font-size:.82rem;margin-bottom:5px}
.rp-err-body{color:#d4a0a0;line-height:1.5}
.rp-err-best{margin-top:7px;color:var(--rp-green);font-weight:600}
@keyframes rpPop{from{opacity:0;transform:translateX(-50%) scale(.92)}to{opacity:1;transform:translateX(-50%) scale(1)}}

/* ── Bottom controls ── */
.rp-ctrl{flex-shrink:0;background:var(--rp-ctrl);border-top:1px solid rgba(255,255,255,.07)}
.rp-streets{display:flex}
.rp-street-btn{
  flex:1;padding:11px 4px;
  background:transparent;border:none;border-right:1px solid rgba(255,255,255,.07);
  color:#555;font-family:'Inter',sans-serif;font-weight:600;font-size:.78rem;
  letter-spacing:.03em;cursor:pointer;transition:.15s;white-space:nowrap
}
.rp-street-btn:last-child{border-right:none}
.rp-street-btn.rp-st-available{color:#999}
.rp-street-btn.rp-st-available:hover:not(.rp-st-active){background:#181818;color:#fff}
.rp-street-btn.rp-st-active{background:var(--rp-red);color:#fff;font-weight:700}
.rp-street-btn.rp-st-disabled{opacity:.2;cursor:default;pointer-events:none}
.rp-btns{display:flex;align-items:center;gap:10px;padding:9px 16px;border-top:1px solid rgba(255,255,255,.05)}
.rp-cbtn{
  width:34px;height:34px;border-radius:50%;
  background:#1c1c1c;border:1px solid #303030;color:#bbb;font-size:.78rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;flex-shrink:0
}
.rp-cbtn:hover{background:#282828;color:#fff;border-color:#555}
.rp-cbtn.play{width:42px;height:42px;font-size:.95rem;border-color:#666}
.rp-cbtn.play:hover{background:#2a2a2a;border-color:#fff}
.rp-speed-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:2px}
.rp-speed-lbl{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--rp-muted);min-width:28px}
.rp-speed-range{
  -webkit-appearance:none;appearance:none;
  width:88px;height:3px;background:#2a2a2a;border-radius:2px;outline:none;cursor:pointer
}
.rp-speed-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#3b82f6;cursor:pointer;border:2px solid #111
}
.rp-speed-range::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;background:#3b82f6;
  cursor:pointer;border:2px solid #111
}
.rp-unit-btn{
  background:#181818;border:1px solid #333;color:var(--rp-muted);
  padding:5px 10px;border-radius:5px;font-family:'Share Tech Mono',monospace;
  font-size:.6rem;cursor:pointer;transition:.15s;flex-shrink:0
}
.rp-unit-btn:hover,.rp-unit-btn.active{border-color:var(--rp-gold);color:var(--rp-gold)}
.rp-log{margin-left:auto;text-align:right;font-family:'Share Tech Mono',monospace;font-size:.6rem}
.rp-log-street{color:var(--rp-gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.rp-log-action{color:#999}
.rp-log-action.err{color:var(--rp-red);font-weight:700}
</style>
</head>
<body>
<div class="rp-wrap">
  <div class="rp-hdr">
    <span class="rp-logo">▷ LEAK<span>LAB</span></span>
    <span class="rp-hand" id="rp-hand-id">Mão #---</span>
    <button class="rp-close" onclick="window.close()">✕ Fechar</button>
  </div>

  <div class="rp-table" id="rp-table">
    <div class="rp-badge" id="rp-badge"></div>
    <div class="rp-err-pop" id="rp-err-pop">
      <div class="rp-err-title">⚠ Erro detectado</div>
      <div class="rp-err-body" id="rp-err-body"></div>
      <div class="rp-err-best" id="rp-err-best"></div>
    </div>

    <div class="rp-persp">
      <svg id="rp-svg" viewBox="0 0 1060 600"
           xmlns="http://www.w3.org/2000/svg"
           preserveAspectRatio="xMidYMid meet">
        <defs>
          <radialGradient id="rp-bg-g" cx="50%" cy="42%" r="66%">
            <stop offset="0%" stop-color="#162238"/>
            <stop offset="100%" stop-color="#070f1c"/>
          </radialGradient>
          <radialGradient id="rp-felt-g" cx="48%" cy="40%" r="58%">
            <stop offset="0%" stop-color="#40b558"/>
            <stop offset="50%" stop-color="#2e9244"/>
            <stop offset="100%" stop-color="#1d6430"/>
          </radialGradient>
          <radialGradient id="rp-rail-g" cx="50%" cy="28%" r="62%">
            <stop offset="0%" stop-color="#252525"/>
            <stop offset="100%" stop-color="#0e0e0e"/>
          </radialGradient>
          <radialGradient id="rp-vig" cx="50%" cy="50%" r="64%">
            <stop offset="38%" stop-color="rgba(0,0,0,0)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0.52)"/>
          </radialGradient>
          <filter id="rp-tshadow" x="-22%" y="-22%" width="144%" height="144%">
            <feDropShadow dx="0" dy="14" stdDeviation="26" flood-color="#000" flood-opacity=".9"/>
          </filter>
          <filter id="rp-cshadow" x="-8%" y="-8%" width="116%" height="116%">
            <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".55"/>
          </filter>
        </defs>

        <!-- Background -->
        <rect width="1060" height="600" fill="url(#rp-bg-g)"/>

        <!-- Table drop shadow -->
        <ellipse cx="533" cy="312" rx="455" ry="252" fill="#000" filter="url(#rp-tshadow)"/>
        <!-- Rail outer -->
        <ellipse cx="530" cy="297" rx="452" ry="248" fill="url(#rp-rail-g)"/>
        <ellipse cx="530" cy="297" rx="452" ry="248" fill="none" stroke="#2e2e2e" stroke-width="1.2"/>
        <ellipse cx="530" cy="297" rx="451" ry="247" fill="none" stroke="#090909" stroke-width="2.5"/>
        <!-- Rail inner border -->
        <ellipse cx="530" cy="297" rx="428" ry="232" fill="none" stroke="#1c1c1c" stroke-width="5"/>
        <ellipse cx="530" cy="297" rx="428" ry="232" fill="none" stroke="#2c2c2c" stroke-width="1"/>
        <!-- Felt -->
        <ellipse cx="530" cy="297" rx="424" ry="228" fill="url(#rp-felt-g)"/>
        <!-- Felt inner highlight ring -->
        <ellipse cx="530" cy="297" rx="414" ry="218" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
        <!-- Vignette -->
        <ellipse cx="530" cy="297" rx="424" ry="228" fill="url(#rp-vig)"/>
        <!-- Watermark -->
        <text x="530" y="308" text-anchor="middle" fill="rgba(255,255,255,0.022)"
              font-family="Inter,sans-serif" font-size="54" font-weight="800" letter-spacing="14">LEAKLAB</text>

        <!-- Board cards -->
        <g id="rp-board"></g>
        <!-- Pot + chips -->
        <g id="rp-pot"></g>
        <!-- Seats -->
        <g id="rp-seats"></g>
        <!-- Bet chips -->
        <g id="rp-chips"></g>
      </svg>
    </div>
  </div>

  <div class="rp-ctrl">
    <div class="rp-streets">
      <button class="rp-street-btn rp-st-disabled" data-street="preflop"  onclick="rpJumpToStreet('preflop')">Pre-flop</button>
      <button class="rp-street-btn rp-st-disabled" data-street="flop"     onclick="rpJumpToStreet('flop')">Flop</button>
      <button class="rp-street-btn rp-st-disabled" data-street="turn"     onclick="rpJumpToStreet('turn')">Turn</button>
      <button class="rp-street-btn rp-st-disabled" data-street="river"    onclick="rpJumpToStreet('river')">River</button>
      <button class="rp-street-btn rp-st-disabled" data-street="showdown" onclick="rpJumpToStreet('showdown')">Showdown</button>
    </div>
    <div class="rp-btns">
      <button class="rp-cbtn" onclick="rpBack()">◀</button>
      <button class="rp-cbtn play" id="rp-play" onclick="rpToggle()">▶</button>
      <button class="rp-cbtn" onclick="rpFwd()">▶▶</button>
      <div class="rp-speed-wrap">
        <input type="range" class="rp-speed-range" id="rp-spd" min="0" max="4" value="2" oninput="rpSetSpeed(+this.value)">
        <span class="rp-speed-lbl" id="rp-spd-lbl">1×</span>
      </div>
      <button class="rp-unit-btn active" id="rp-unit-btn" onclick="rpToggleBB()">BB</button>
      <div class="rp-log">
        <div class="rp-log-street" id="rp-log-st">PREFLOP</div>
        <div class="rp-log-action" id="rp-log-ac">Início da mão</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const CX=530, CY=297;
const RX_SEAT=455, RY_SEAT=252;
const SUIT_SYM={s:'♠',h:'♥',d:'♦',c:'♣'};
const SUIT_COL={s:'#111',h:'#cc1f1f',d:'#cc1f1f',c:'#111'};
const SPEED_MAP=[2200,1500,1000,550,200];
const SPEED_LABELS=['0.5×','0.8×','1×','1.5×','3×'];
const AC_COLORS={folds:'#e52020',calls:'#3aaa52',raises:'#c9a840',bets:'#c9a840',checks:'#5580aa','all-in':'#ff4040'};
const POS_COLORS={BTN:'#c9a840',BB:'#e52020',SB:'#d47030'};
const CHIP_PALETTE=['#1a55d4','#cc2020','#282828','#1e8c30','#c9a840','#7c3acd','#d47010','#0e7090'];

// ── State ────────────────────────────────────────────────────────────────────
let REPLAY=null, rpStep=0, rpPlaying=false, rpTimer=null, rpSpeed=1000;
let rpShowBB=true, _rpLayout=null, _rpStreetMap={};

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtAmt(v, bb){
  if(rpShowBB){ const x=v/bb; return (x<1?x.toFixed(1):Math.round(x))+'BB'; }
  return v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)+'';
}

// ── 3D chip stack ─────────────────────────────────────────────────────────────
// cx,cy = center/bottom of stack; stack grows upward. count = number of chips.
function chipStackSVG(cx, cy, count){
  count=Math.max(1,Math.min(9,count));
  const H=10, RX=20, RY=7;
  // drop shadow
  let h=`<ellipse cx="${cx+4}" cy="${cy+6}" rx="${RX+4}" ry="${RY+3}" fill="rgba(0,0,0,0.4)"/>`;
  // render bottom chips first so top chips paint over them
  for(let i=count-1;i>=0;i--){
    const ty=cy-i*H;
    const col=CHIP_PALETTE[i%CHIP_PALETTE.length];
    // chip side (depth illusion)
    h+=`<ellipse cx="${cx}" cy="${ty+H*0.38}" rx="${RX}" ry="${RY}" fill="${col}" opacity="0.5"/>`;
    // chip top face
    h+=`<ellipse cx="${cx}" cy="${ty}" rx="${RX}" ry="${RY}" fill="${col}"/>`;
    // inner ring detail
    h+=`<ellipse cx="${cx}" cy="${ty}" rx="${RX-6}" ry="${RY-2.5}" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>`;
    // highlight
    h+=`<ellipse cx="${cx-4}" cy="${ty-2}" rx="${RX-9}" ry="${RY-3.5}" fill="rgba(255,255,255,0.16)"/>`;
  }
  return h;
}

// ── Card SVG ─────────────────────────────────────────────────────────────────
function cardSVG(code, x, y, w=50, h=68, faceDown=false){
  if(!code||faceDown){
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="#12243e" stroke="#1c3660" stroke-width="1"/>
            <rect x="${x+2.5}" y="${y+2.5}" width="${w-5}" height="${h-5}" rx="3" fill="none" stroke="#1a325a" stroke-width=".7"/>
            <line x1="${x+6}" y1="${y+6}" x2="${x+w-6}" y2="${y+h-6}" stroke="#1d3860" stroke-width="1"/>
            <line x1="${x+w-6}" y1="${y+6}" x2="${x+6}" y2="${y+h-6}" stroke="#1d3860" stroke-width="1"/>
            <rect x="${x+w/2-4.5}" y="${y+h/2-4.5}" width="9" height="9" fill="none" stroke="#243e6a" stroke-width=".8"
                  transform="rotate(45,${x+w/2},${y+h/2})"/>`;
  }
  const rank=code.slice(0,-1).toUpperCase();
  const suit=code.slice(-1).toLowerCase();
  const col=SUIT_COL[suit]||'#111';
  const sym=SUIT_SYM[suit]||suit;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="#f8f4ea" stroke="#ddd5c0" stroke-width=".5" filter="url(#rp-cshadow)"/>
          <text x="${x+5}" y="${y+16}" fill="${col}" font-family="Inter,sans-serif" font-size="15" font-weight="700">${rank}</text>
          <text x="${x+5}" y="${y+30}" fill="${col}" font-family="Inter,sans-serif" font-size="13">${sym}</text>
          <text x="${x+w/2}" y="${y+h/2+14}" text-anchor="middle" fill="${col}" font-family="Inter,sans-serif" font-size="28" opacity=".11">${sym}</text>
          <text x="${x+w-5}" y="${y+h-7}" text-anchor="end" fill="${col}" font-family="Inter,sans-serif" font-size="15" font-weight="700">${rank}</text>
          <text x="${x+w-5}" y="${y+h-22}" text-anchor="end" fill="${col}" font-family="Inter,sans-serif" font-size="12">${sym}</text>`;
}

// ── Seat layout — hero always at bottom ──────────────────────────────────────
function rpBuildLayout(seatNums, heroSeat){
  if(_rpLayout) return _rpLayout;
  const n=seatNums.length;
  const heroIdx=heroSeat!==undefined ? seatNums.indexOf(heroSeat) : n-1;
  const rotOffset=heroIdx>=0 ? (180-(360/n)*heroIdx) : 0;
  _rpLayout={};
  seatNums.forEach((s,i)=>{
    const baseAng=-90+(360/n)*i+rotOffset;
    const ang=baseAng*Math.PI/180;
    const x=Math.round(CX+RX_SEAT*Math.cos(ang));
    const y=Math.round(CY+RY_SEAT*Math.sin(ang));
    // dir: 'top' = seat above table center (cards rendered below seat, toward center)
    //      'bottom' = seat below table center (cards rendered above seat, toward center)
    const dir=y<CY ? 'top' : 'bottom';
    _rpLayout[s]={x,y,dir};
  });
  return _rpLayout;
}

// ── Board ─────────────────────────────────────────────────────────────────────
function rpRenderBoard(cards){
  const g=document.getElementById('rp-board');
  g.innerHTML='';
  const W=50,H=68,GAP=8;
  const totalW=5*W+4*GAP;
  const sx=CX-totalW/2;
  const y=CY-H/2-8;   // cards vertically centered slightly above CY
  for(let i=0;i<5;i++){
    const x=sx+i*(W+GAP);
    if(i<cards.length){
      g.innerHTML+=cardSVG(cards[i],x,y,W,H);
    } else {
      g.innerHTML+=`<rect x="${x}" y="${y}" width="${W}" height="${H}" rx="4"
        fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="5 4"/>`;
    }
  }
}

// ── Pot + chips ───────────────────────────────────────────────────────────────
function rpRenderPot(pot, bb){
  const g=document.getElementById('rp-pot');
  g.innerHTML='';
  const H=68, y=CY-H/2-8;  // sync with board
  const cardBottom=y+H;     // bottom of cards = CY-8+34 = CY+26 roughly

  // "Pot: X" text above cards
  if(pot>0){
    const potStr=fmtAmt(pot,bb);
    g.innerHTML+=`<text x="${CX}" y="${y-14}" text-anchor="middle"
      fill="rgba(255,255,255,0.82)" font-family="Inter,sans-serif" font-size="14" font-weight="600">Pot: ${potStr}</text>`;

    // Chip stack below cards
    const chipCY=cardBottom+52;
    const chipCnt=Math.max(1,Math.min(9,Math.ceil(pot/(bb*4))));
    g.innerHTML+=chipStackSVG(CX,chipCY,chipCnt);

    // Pot amount below chips
    g.innerHTML+=`<text x="${CX}" y="${chipCY+18}" text-anchor="middle"
      fill="rgba(255,255,255,0.88)" font-family="Share Tech Mono,monospace" font-size="13" font-weight="700">${potStr}</text>`;

    // Game type label
    g.innerHTML+=`<text x="${CX}" y="${chipCY+34}" text-anchor="middle"
      fill="rgba(255,255,255,0.2)" font-family="Inter,sans-serif" font-size="11">NL Hold'em</text>`;
  }
}

// ── Seats ─────────────────────────────────────────────────────────────────────
function rpRenderSeats(ev, bb){
  const seatsG=document.getElementById('rp-seats');
  const chipsG=document.getElementById('rp-chips');
  seatsG.innerHTML=''; chipsG.innerHTML='';

  const seatNums=Object.keys(ev.seats).map(Number).sort((a,b)=>a-b);
  const heroSeat=seatNums.find(sn=>ev.seats[sn].player===ev.hero);
  const layout=rpBuildLayout(seatNums,heroSeat);
  const bw=128, bh=52, brad=26;

  seatNums.forEach(sn=>{
    const d=ev.seats[sn];
    const pos=layout[sn];
    if(!pos) return;

    const isHero  =d.player===ev.hero;
    const isBtn   =sn===ev.button;
    const isFolded=(ev.folded||[]).includes(d.player);
    const isActive=ev.type==='action'&&ev.seat===sn;
    const bx=pos.x-bw/2, by=pos.y-bh/2;
    const dir=pos.dir;
    const opacity=isFolded?0.28:1;

    let bg='#1c1c1c', bd='#323232', bdW=1.5;
    if(isActive)                              {bd='#c9a840';bdW=2.5;}
    if(isActive&&ev.is_error&&ev.is_hero)     {bg='#250808';bd='#e52020';bdW=2.5;}

    let html=`<g opacity="${opacity}">`;

    // ── Hero ring ──
    if(isHero){
      html+=`<rect x="${bx-7}" y="${by-7}" width="${bw+14}" height="${bh+14}" rx="${brad+7}"
                   fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="3.5"/>`;
    }

    // ── Seat pod ──
    html+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="${brad}"
                 fill="${bg}" stroke="${bd}" stroke-width="${bdW}"/>`;
    if(isActive){
      html+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="${brad}"
                   fill="rgba(201,168,64,0.07)"/>`;
    }

    // ── Position badge ──
    if(d.pos){
      const pc=POS_COLORS[d.pos]||'#3a6aaa';
      html+=`<rect x="${bx+bw-44}" y="${by+5}" width="40" height="16" rx="8" fill="${pc}" opacity="0.95"/>
             <text x="${bx+bw-24}" y="${by+16.5}" text-anchor="middle"
                   fill="#fff" font-family="Inter,sans-serif" font-size="9.5" font-weight="700">${d.pos}</text>`;
    }

    // ── Player name ──
    const maxC=14;
    const name=d.player.length>maxC?d.player.slice(0,maxC)+'…':d.player;
    html+=`<text x="${pos.x}" y="${by+26}" text-anchor="middle"
                 fill="${isHero?'#fff':'#e0dbd4'}"
                 font-family="Inter,sans-serif" font-size="${isHero?14:12.5}" font-weight="${isHero?700:500}">${name}</text>`;

    // ── Stack ──
    const sv=(ev.stacks&&ev.stacks[sn]!=null)?ev.stacks[sn]:d.stack;
    html+=`<text x="${pos.x}" y="${by+41}" text-anchor="middle"
                 fill="#777" font-family="Share Tech Mono,monospace" font-size="10">${fmtAmt(sv,bb)}</text>`;

    // ── Dealer button ──
    if(isBtn){
      html+=`<circle cx="${bx-8}" cy="${by+bh/2}" r="11" fill="#dd1c1c"/>
             <text x="${bx-8}" y="${by+bh/2+4.5}" text-anchor="middle"
                   fill="#fff" font-family="Inter,sans-serif" font-size="9.5" font-weight="800">D</text>`;
    }

    // ── Action label ──
    if(isActive&&ev.action){
      const ac=AC_COLORS[ev.action]||'#888';
      const amtStr=ev.amount>0?(' '+fmtAmt(ev.amount,bb)):'';
      const actLabel=ev.action.toUpperCase()+amtStr;
      const labY=dir==='top'?by+bh+20:by-10;
      html+=`<rect x="${pos.x-42}" y="${labY-13}" width="84" height="19" rx="9.5" fill="${ac}" opacity=".96"/>
             <text x="${pos.x}" y="${labY}" text-anchor="middle"
                   fill="#fff" font-family="Inter,sans-serif" font-size="10.5" font-weight="700">${actLabel}</text>`;
    }

    // ── Cards ──
    const cw=42, ch=58, cg=4;
    const cardY=dir==='top' ? by+bh+8 : by-ch-10;
    if(isHero&&ev.hero_cards&&ev.hero_cards.length===2){
      html+=cardSVG(ev.hero_cards[0],pos.x-cw-cg/2,cardY,cw,ch);
      html+=cardSVG(ev.hero_cards[1],pos.x+cg/2,   cardY,cw,ch);
    } else if(!isHero&&!isFolded){
      const vw=30,vh=42;
      const vcY=dir==='top'?by+bh+6:by-vh-8;
      html+=cardSVG(null,pos.x-vw-2,vcY,vw,vh,true);
      html+=cardSVG(null,pos.x+2,   vcY,vw,vh,true);
    }

    html+='</g>';
    seatsG.innerHTML+=html;

    // ── Bet chips on table ──
    const bet=ev.bets&&ev.bets[sn]>0?ev.bets[sn]:0;
    if(bet>0){
      const t=0.36;
      const cx2=Math.round(pos.x+(CX-pos.x)*t);
      const cy2=Math.round(pos.y+(CY-pos.y)*t);
      const cnt=Math.max(1,Math.min(5,Math.ceil(bet/(bb*2))));
      // small bet chip stack
      const H=8,RX=14,RY=5;
      let cs=`<ellipse cx="${cx2+3}" cy="${cy2+5}" rx="${RX+3}" ry="${RY+2}" fill="rgba(0,0,0,0.38)"/>`;
      for(let i=cnt-1;i>=0;i--){
        const ty=cy2-i*H;
        const col=CHIP_PALETTE[i%CHIP_PALETTE.length];
        cs+=`<ellipse cx="${cx2}" cy="${ty+H*0.38}" rx="${RX}" ry="${RY}" fill="${col}" opacity="0.5"/>`;
        cs+=`<ellipse cx="${cx2}" cy="${ty}" rx="${RX}" ry="${RY}" fill="${col}"/>`;
        cs+=`<ellipse cx="${cx2}" cy="${ty}" rx="${RX-4}" ry="${RY-1.8}" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>`;
      }
      chipsG.innerHTML+=cs;
      const betStr=fmtAmt(bet,bb);
      chipsG.innerHTML+=`<rect x="${cx2-20}" y="${cy2+12}" width="40" height="14" rx="7"
        fill="rgba(0,0,0,0.72)" stroke="rgba(255,255,255,0.14)" stroke-width=".7"/>
      <text x="${cx2}" y="${cy2+22}" text-anchor="middle"
            fill="#fff" font-family="Share Tech Mono,monospace" font-size="8.5">${betStr}</text>`;
    }
  });
}

// ── Main render ───────────────────────────────────────────────────────────────
function rpRender(step){
  if(!REPLAY||step<0||step>=REPLAY.timeline.length) return;
  const ev=REPLAY.timeline[step];
  const bb=REPLAY.bb||100;

  if(ev.type==='street'){
    const badge=document.getElementById('rp-badge');
    badge.textContent=ev.street.toUpperCase();
    badge.className='rp-badge show';
    setTimeout(()=>badge.className='rp-badge',1600);
  }

  // Street tabs
  document.querySelectorAll('.rp-street-btn').forEach(btn=>{
    btn.classList.remove('rp-st-active');
    if(btn.dataset.street===(ev.street||'preflop')) btn.classList.add('rp-st-active');
  });

  // Log
  document.getElementById('rp-log-st').textContent=(ev.street||'preflop').toUpperCase();
  const logAc=document.getElementById('rp-log-ac');
  if(ev.is_error){logAc.textContent='⚠ '+ev.desc;logAc.className='rp-log-action err';}
  else           {logAc.textContent=ev.desc||'—';logAc.className='rp-log-action';}

  rpRenderBoard(ev.board||[]);
  rpRenderPot(ev.pot||0,bb);
  rpRenderSeats(ev,bb);

  // Error popup
  const popup=document.getElementById('rp-err-pop');
  if(ev.is_error&&ev.is_hero){
    const labels={clear_mistake:'ERRO GRAVE',small_mistake:'Erro',marginal:'Marginal'};
    document.getElementById('rp-err-body').textContent='Você fez '+ev.action+' — penalidade: '+ev.error_score;
    document.getElementById('rp-err-best').textContent='✓ Ação correta: '+ev.best_action;
    popup.querySelector('.rp-err-title').textContent='⚠ '+(labels[ev.error_label]||'Atenção');
    popup.classList.add('show');
    setTimeout(()=>popup.classList.remove('show'),4500);
  } else {popup.classList.remove('show');}
}

// ── Controls ──────────────────────────────────────────────────────────────────
function rpSetSpeed(v){
  rpSpeed=SPEED_MAP[v]||1000;
  document.getElementById('rp-spd-lbl').textContent=SPEED_LABELS[v]||'1×';
}
function rpToggleBB(){
  rpShowBB=!rpShowBB;
  const btn=document.getElementById('rp-unit-btn');
  btn.textContent=rpShowBB?'BB':'chips';
  btn.classList.toggle('active',rpShowBB);
  rpRender(rpStep);
}
function rpJumpToStreet(street){
  const idx=_rpStreetMap[street];
  if(idx!==undefined) rpSeekTo(idx);
}
function rpToggle(){
  rpPlaying=!rpPlaying;
  document.getElementById('rp-play').textContent=rpPlaying?'⏸':'▶';
  if(rpPlaying) rpPlayNext(); else clearTimeout(rpTimer);
}
function rpPlayNext(){
  if(!rpPlaying) return;
  if(rpStep>=REPLAY.timeline.length-1){rpPlaying=false;document.getElementById('rp-play').textContent='▶';return;}
  rpStep++;rpRender(rpStep);
  rpTimer=setTimeout(rpPlayNext,REPLAY.timeline[rpStep].is_error?rpSpeed*2.5:rpSpeed);
}
function rpFwd(){clearTimeout(rpTimer);rpPlaying=false;document.getElementById('rp-play').textContent='▶';if(rpStep<REPLAY.timeline.length-1){rpStep++;rpRender(rpStep);}}
function rpBack(){clearTimeout(rpTimer);rpPlaying=false;document.getElementById('rp-play').textContent='▶';if(rpStep>0){rpStep--;rpRender(rpStep);}}
function rpSeekTo(s){clearTimeout(rpTimer);rpPlaying=false;document.getElementById('rp-play').textContent='▶';rpStep=s;rpRender(s);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') rpFwd();
  if(e.key==='ArrowLeft')  rpBack();
  if(e.key===' '){e.preventDefault();rpToggle();}
  if(e.key==='b') rpToggleBB();
});

// ── Init ──────────────────────────────────────────────────────────────────────
function initReplayer(data){
  REPLAY=data;rpStep=0;_rpLayout=null;_rpStreetMap={};
  document.getElementById('rp-hand-id').textContent='Mão #'+String(data.hand_id).slice(-8);

  const ev0=data.timeline[0];
  const sn0=Object.keys(ev0.seats).map(Number).sort((a,b)=>a-b);
  rpBuildLayout(sn0,sn0.find(s=>ev0.seats[s].player===data.hero));

  data.timeline.forEach((ev,i)=>{
    const s=ev.street||'preflop';
    if(_rpStreetMap[s]===undefined) _rpStreetMap[s]=i;
    if(ev.type==='showdown'&&_rpStreetMap['showdown']===undefined) _rpStreetMap['showdown']=i;
  });

  document.querySelectorAll('.rp-street-btn').forEach(btn=>{
    if(_rpStreetMap[btn.dataset.street]!==undefined){
      btn.classList.remove('rp-st-disabled');
      btn.classList.add('rp-st-available');
    }
  });

  rpRender(0);
}

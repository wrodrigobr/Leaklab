<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LeakLab Replayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rp-felt:  #1a5c2e;
  --rp-felt2: #246638;
  --rp-rail:  #3a1e0a;
  --rp-rail2: #5c3010;
  --rp-gold:  #c9a84c;
  --rp-gold2: #e8c96a;
  --rp-red:   #c0392b;
  --rp-green: #4caf7d;
  --rp-ink:   #0d1117;
  --rp-bg:    #0f1118;
  --rp-card:  #161b22;
  --rp-brd:   #2d333b;
  --rp-text:  #e8e6df;
  --rp-muted: #8a8680;
  --rp-dim:   #5a5652;
}
html,body{width:100%;height:100%;background:var(--rp-bg);color:var(--rp-text);
  font-family:'Rajdhani',sans-serif;overflow:hidden}

/* ── Layout ── */
.rp-wrap{display:flex;flex-direction:column;height:100vh;padding:8px 12px}
.rp-hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-shrink:0}
.rp-logo{font-size:.7rem;font-weight:700;color:var(--rp-gold);letter-spacing:.14em;
  font-family:'Share Tech Mono',monospace}
.rp-hand{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--rp-dim)}
.rp-close{margin-left:auto;background:none;border:1px solid var(--rp-brd);
  color:var(--rp-muted);padding:3px 12px;border-radius:4px;cursor:pointer;
  font-size:.65rem;font-family:'Share Tech Mono',monospace;transition:.15s}
.rp-close:hover{border-color:var(--rp-gold);color:var(--rp-gold)}

/* ── Table ── */
.rp-table{flex:1;min-height:0;position:relative}
.rp-table svg{width:100%;height:100%;display:block}

/* ── Controls ── */
.rp-ctrl{flex-shrink:0;background:var(--rp-card);border:1px solid var(--rp-brd);
  border-radius:8px;padding:8px 12px;margin-top:6px}

/* Street tabs */
.rp-streets{display:flex;gap:4px;margin-bottom:8px}
.rp-street-btn{
  flex:1;padding:6px 4px;border:1px solid var(--rp-brd);border-radius:6px;
  background:transparent;color:var(--rp-dim);
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.78rem;
  letter-spacing:.04em;cursor:pointer;transition:.15s;white-space:nowrap}
.rp-street-btn.rp-st-available{color:var(--rp-text)}
.rp-street-btn.rp-st-available:hover:not(.rp-st-active){border-color:var(--rp-gold);color:var(--rp-gold)}
.rp-street-btn.rp-st-active{background:var(--rp-red);border-color:var(--rp-red);color:#fff}
.rp-street-btn.rp-st-disabled{opacity:.28;cursor:default;pointer-events:none}

/* Playback row */
.rp-btns{display:flex;align-items:center;gap:8px}
.rp-btn{background:var(--rp-card);border:1px solid var(--rp-brd);color:var(--rp-text);
  width:32px;height:32px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:.8rem;transition:.15s;flex-shrink:0}
.rp-btn:hover{border-color:var(--rp-gold);color:var(--rp-gold)}
.rp-btn.play{width:40px;height:40px;font-size:.95rem;border-color:var(--rp-gold);color:var(--rp-gold)}
.rp-btn.play:hover{background:var(--rp-gold);color:#000}
.rp-speed-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.rp-speed-lbl{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--rp-dim);min-width:26px}
.rp-speed-range{-webkit-appearance:none;appearance:none;width:76px;height:3px;
  background:var(--rp-brd);border-radius:2px;outline:none;cursor:pointer}
.rp-speed-range::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#3b82f6;cursor:pointer}
.rp-speed-range::-moz-range-thumb{width:12px;height:12px;border-radius:50%;
  background:#3b82f6;cursor:pointer;border:none}
.rp-unit-btn{background:var(--rp-card);border:1px solid var(--rp-brd);color:var(--rp-dim);
  padding:4px 8px;border-radius:5px;font-family:'Share Tech Mono',monospace;
  font-size:.6rem;cursor:pointer;transition:.15s;flex-shrink:0}
.rp-unit-btn:hover,.rp-unit-btn.active{border-color:var(--rp-gold);color:var(--rp-gold)}
.rp-log{margin-left:auto;text-align:right;font-family:'Share Tech Mono',monospace;font-size:.62rem}
.rp-log-street{color:var(--rp-gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.rp-log-action{color:var(--rp-text)}
.rp-log-action.err{color:var(--rp-red);font-weight:700}

/* ── Street badge ── */
.rp-badge{position:absolute;top:6px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);border:1px solid var(--rp-gold);border-radius:20px;
  padding:2px 14px;font-family:'Share Tech Mono',monospace;font-size:.6rem;
  color:var(--rp-gold);letter-spacing:.14em;pointer-events:none;opacity:0;transition:.3s}
.rp-badge.show{opacity:1}

/* ── Error popup ── */
.rp-err-pop{position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#1a0808;
  border:1px solid var(--rp-red);border-radius:8px;padding:10px 14px;
  width:240px;z-index:20;display:none;font-size:.72rem}
.rp-err-pop.show{display:block;animation:rpPop .2s ease}
.rp-err-title{color:var(--rp-red);font-weight:700;font-size:.78rem;margin-bottom:4px}
.rp-err-body{color:#d4a0a0;line-height:1.5}
.rp-err-best{margin-top:6px;color:var(--rp-green);font-weight:600}
@keyframes rpPop{from{opacity:0;transform:translateX(-50%) scale(.9)}to{opacity:1;transform:translateX(-50%) scale(1)}}
</style>
</head>
<body>
<div class="rp-wrap">
  <div class="rp-hdr">
    <span class="rp-logo">▷ LEAKLAB</span>
    <span class="rp-hand" id="rp-hand-id">Mão #---</span>
    <button class="rp-close" onclick="window.close()">✕ Fechar</button>
  </div>

  <div class="rp-table" id="rp-table">
    <div class="rp-badge" id="rp-badge"></div>
    <div class="rp-err-pop" id="rp-err-pop">
      <div class="rp-err-title">⚠ Erro detectado</div>
      <div class="rp-err-body" id="rp-err-body"></div>
      <div class="rp-err-best" id="rp-err-best"></div>
    </div>
    <svg id="rp-svg" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="rp-felt-g" cx="50%" cy="42%" r="54%">
          <stop offset="0%" stop-color="#2e7d46"/>
          <stop offset="100%" stop-color="#1a5230"/>
        </radialGradient>
        <radialGradient id="rp-rail-g" cx="50%" cy="28%" r="62%">
          <stop offset="0%" stop-color="#6a3818"/>
          <stop offset="100%" stop-color="#2d1408"/>
        </radialGradient>
        <radialGradient id="rp-vignette" cx="50%" cy="50%" r="68%">
          <stop offset="38%" stop-color="transparent"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.42)"/>
        </radialGradient>
        <filter id="rp-shadow">
          <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity=".75"/>
        </filter>
      </defs>

      <!-- Sombra externa -->
      <ellipse cx="450" cy="264" rx="422" ry="233" fill="#00000070" filter="url(#rp-shadow)"/>
      <!-- Rail externo -->
      <ellipse cx="450" cy="252" rx="420" ry="230" fill="url(#rp-rail-g)"/>
      <ellipse cx="450" cy="252" rx="420" ry="230" fill="none" stroke="#8a4820" stroke-width="1.5"/>
      <ellipse cx="450" cy="252" rx="420" ry="230" fill="none" stroke="#1e0a04" stroke-width="6"/>
      <!-- Borda interna do rail -->
      <ellipse cx="450" cy="252" rx="370" ry="194" fill="none" stroke="#7a3e18" stroke-width="1"/>
      <ellipse cx="450" cy="252" rx="370" ry="194" fill="none" stroke="#1a0904" stroke-width="3.5"/>
      <!-- Felt -->
      <ellipse cx="450" cy="252" rx="367" ry="191" fill="url(#rp-felt-g)"/>
      <ellipse cx="450" cy="252" rx="367" ry="191" fill="none" stroke="#1e6035" stroke-width="6"/>
      <ellipse cx="450" cy="252" rx="357" ry="181" fill="none" stroke="#2a7040" stroke-width=".8"/>
      <!-- Vignette -->
      <ellipse cx="450" cy="252" rx="367" ry="191" fill="url(#rp-vignette)"/>
      <!-- Watermark -->
      <text x="450" y="260" text-anchor="middle" fill="#ffffff03"
            font-family="Rajdhani,sans-serif" font-size="56" font-weight="700" letter-spacing="12">LEAKLAB</text>

      <!-- Board area -->
      <rect x="284" y="217" width="332" height="66" rx="8"
            fill="#00000028" stroke="#2a6b3e" stroke-width="1"/>
      <text x="450" y="210" text-anchor="middle" fill="#c9a84c44"
            font-family="Share Tech Mono,monospace" font-size="9" letter-spacing=".12em">COMMUNITY CARDS</text>

      <!-- Board cards (dinâmico) -->
      <g id="rp-board"></g>

      <!-- Pot -->
      <g id="rp-pot">
        <rect x="376" y="163" width="148" height="26" rx="13" fill="#00000055" stroke="#c9a84c44" stroke-width="1"/>
        <text x="410" y="180" text-anchor="middle" fill="#c9a84c77"
              font-family="Share Tech Mono,monospace" font-size="8.5" letter-spacing=".1em">POT</text>
        <text id="rp-pot-val" x="460" y="180" text-anchor="middle" fill="#c9a84c"
              font-family="Share Tech Mono,monospace" font-size="14" font-weight="bold"></text>
      </g>

      <!-- Seats (dinâmico) -->
      <g id="rp-seats"></g>
      <!-- Chips (dinâmico) -->
      <g id="rp-chips"></g>
    </svg>
  </div>

  <div class="rp-ctrl">
    <div class="rp-streets">
      <button class="rp-street-btn rp-st-disabled" data-street="preflop" onclick="rpJumpToStreet('preflop')">Pre-flop</button>
      <button class="rp-street-btn rp-st-disabled" data-street="flop"    onclick="rpJumpToStreet('flop')">Flop</button>
      <button class="rp-street-btn rp-st-disabled" data-street="turn"    onclick="rpJumpToStreet('turn')">Turn</button>
      <button class="rp-street-btn rp-st-disabled" data-street="river"   onclick="rpJumpToStreet('river')">River</button>
      <button class="rp-street-btn rp-st-disabled" data-street="showdown" onclick="rpJumpToStreet('showdown')">Showdown</button>
    </div>
    <div class="rp-btns">
      <button class="rp-btn" onclick="rpBack()" title="Voltar">◀</button>
      <button class="rp-btn play" id="rp-play" onclick="rpToggle()">▶</button>
      <button class="rp-btn" onclick="rpFwd()" title="Avançar">▶▶</button>
      <div class="rp-speed-wrap">
        <input type="range" class="rp-speed-range" id="rp-spd" min="0" max="4" value="2" oninput="rpSetSpeed(+this.value)">
        <span class="rp-speed-lbl" id="rp-spd-lbl">1×</span>
      </div>
      <button class="rp-unit-btn active" id="rp-unit-btn" onclick="rpToggleBB()">BB</button>
      <div class="rp-log">
        <div class="rp-log-street" id="rp-log-st">PREFLOP</div>
        <div class="rp-log-action" id="rp-log-ac">Início da mão</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Helpers de carta ──────────────────────────────────────────────────────────
const SUIT_SYM   = {s:'♠',h:'♥',d:'♦',c:'♣'};
const SUIT_COLOR = {s:'#1a1a1a',h:'#cc2222',d:'#cc2222',c:'#1a1a1a'};

function cardSVG(code, x, y, w=38, h=52, faceDown=false){
  if(!code || faceDown){
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="#162236" stroke="#1d3655" stroke-width="1"/>
            <rect x="${x+2}" y="${y+2}" width="${w-4}" height="${h-4}" rx="2" fill="none" stroke="#1a3050" stroke-width=".7"/>
            <line x1="${x+5}" y1="${y+5}" x2="${x+w-5}" y2="${y+h-5}" stroke="#1e3858" stroke-width=".8"/>
            <line x1="${x+w-5}" y1="${y+5}" x2="${x+5}" y2="${y+h-5}" stroke="#1e3858" stroke-width=".8"/>
            <rect x="${x+w/2-3}" y="${y+h/2-3}" width="6" height="6" fill="none" stroke="#243e5e" stroke-width=".7"
                  transform="rotate(45,${x+w/2},${y+h/2})"/>`;
  }
  const rank = code.slice(0,-1).toUpperCase();
  const suit = code.slice(-1).toLowerCase();
  const col  = SUIT_COLOR[suit] || '#1a1a1a';
  const sym  = SUIT_SYM[suit]   || suit;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="#f4efe6" stroke="#d0c8b8" stroke-width=".5"/>
          <text x="${x+4}" y="${y+13}" fill="${col}" font-family="Rajdhani,sans-serif" font-size="13" font-weight="700">${rank}</text>
          <text x="${x+4}" y="${y+24}" fill="${col}" font-family="Rajdhani,sans-serif" font-size="11">${sym}</text>
          <text x="${x+w/2}" y="${y+h/2+10}" text-anchor="middle" fill="${col}" font-family="Rajdhani,sans-serif" font-size="22" opacity=".15">${sym}</text>
          <text x="${x+w-4}" y="${y+h-5}" text-anchor="end" fill="${col}" font-family="Rajdhani,sans-serif" font-size="13" font-weight="700">${rank}</text>`;
}

// ── Layout de seats — hero sempre na posição inferior ─────────────────────────
const CX=450, CY=252, RX=365, RY=189;
let _rpLayout = null;

function rpBuildLayout(seatNums, heroSeat){
  if(_rpLayout) return _rpLayout;
  const n = seatNums.length;
  const heroIdx = heroSeat !== undefined ? seatNums.indexOf(heroSeat) : n-1;
  // rotOffset coloca heroIdx no ângulo 90° (posição inferior)
  const rotOffset = heroIdx >= 0 ? (180 - (360/n)*heroIdx) : 0;
  _rpLayout = {};
  seatNums.forEach((s, i) => {
    const baseAng = -90 + (360/n)*i + rotOffset;
    const ang = baseAng * Math.PI/180;
    const x   = Math.round(CX + RX*Math.cos(ang));
    const y   = Math.round(CY + RY*Math.sin(ang));
    const a   = ((baseAng) % 360 + 360) % 360;
    let dir;
    if(a>=315 || a<45)  dir='top';
    else if(a<135)       dir='bottom';
    else if(a<225)       dir='left';
    else                 dir='top';
    _rpLayout[s] = {x, y, dir};
  });
  return _rpLayout;
}

// ── Estado ────────────────────────────────────────────────────────────────────
let REPLAY=null, rpStep=0, rpPlaying=false, rpTimer=null, rpSpeed=1000;
let rpShowBB=true;
let _rpStreetMap = {};

const SPEED_MAP    = [2200,1500,1000,550,200];
const SPEED_LABELS = ['0.5×','0.8×','1×','1.5×','3×'];

function rpSetSpeed(v){
  rpSpeed = SPEED_MAP[v] || 1000;
  document.getElementById('rp-spd-lbl').textContent = SPEED_LABELS[v] || '1×';
}

function rpToggleBB(){
  rpShowBB=!rpShowBB;
  const btn=document.getElementById('rp-unit-btn');
  btn.textContent = rpShowBB ? 'BB' : 'chips';
  btn.classList.toggle('active', rpShowBB);
  rpRender(rpStep);
}

// ── Street tabs ───────────────────────────────────────────────────────────────
function rpJumpToStreet(street){
  const idx = _rpStreetMap[street];
  if(idx !== undefined) rpSeekTo(idx);
}

function rpUpdateStreetTabs(street){
  document.querySelectorAll('.rp-street-btn').forEach(btn => {
    btn.classList.remove('rp-st-active');
    if(btn.dataset.street === street) btn.classList.add('rp-st-active');
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function rpRender(step){
  if(!REPLAY || step<0 || step>=REPLAY.timeline.length) return;
  const ev = REPLAY.timeline[step];
  const bb = REPLAY.bb || 100;

  if(ev.type==='street'){
    const badge=document.getElementById('rp-badge');
    badge.textContent=ev.street.toUpperCase();
    badge.className='rp-badge show';
    setTimeout(()=>badge.className='rp-badge',1600);
  }

  rpUpdateStreetTabs(ev.street || 'preflop');

  document.getElementById('rp-log-st').textContent=(ev.street||'preflop').toUpperCase();
  const logAc=document.getElementById('rp-log-ac');
  if(ev.is_error){ logAc.textContent='⚠ '+ev.desc; logAc.className='rp-log-action err'; }
  else            { logAc.textContent=ev.desc||'—';  logAc.className='rp-log-action'; }

  const pot=ev.pot||0;
  const fmtBB    = (v,b) => { const x=v/b; return (x<1?x.toFixed(1):Math.round(x))+'BB'; };
  const fmtChips = v => v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)+'';
  document.getElementById('rp-pot-val').textContent = pot>0 ? (rpShowBB?fmtBB(pot,bb):fmtChips(pot)) : '';

  rpRenderBoard(ev.board||[]);
  rpRenderSeats(ev, bb);

  const popup=document.getElementById('rp-err-pop');
  if(ev.is_error && ev.is_hero){
    const labels={clear_mistake:'ERRO GRAVE',small_mistake:'Erro',marginal:'Marginal'};
    document.getElementById('rp-err-body').textContent='Você fez '+ev.action+' — penalidade: '+ev.error_score;
    document.getElementById('rp-err-best').textContent='✓ Ação correta: '+ev.best_action;
    popup.querySelector('.rp-err-title').textContent='⚠ '+(labels[ev.error_label]||'Atenção');
    popup.classList.add('show');
    setTimeout(()=>popup.classList.remove('show'), 4500);
  } else { popup.classList.remove('show'); }
}

function rpRenderBoard(cards){
  const g = document.getElementById('rp-board');
  g.innerHTML='';
  const sx=292, y=222, W=42, H=56, GAP=6;
  for(let i=0;i<5;i++){
    const x=sx+i*(W+GAP);
    if(i<cards.length) g.innerHTML+=cardSVG(cards[i],x,y,W,H);
    else g.innerHTML+=`<rect x="${x}" y="${y}" width="${W}" height="${H}" rx="4"
      fill="#00000022" stroke="#1e5e30" stroke-width="1" stroke-dasharray="4 3"/>`;
  }
}

function rpRenderSeats(ev, bb){
  const seatsG=document.getElementById('rp-seats');
  const chipsG=document.getElementById('rp-chips');
  seatsG.innerHTML=''; chipsG.innerHTML='';

  const seatNums = Object.keys(ev.seats).map(Number).sort((a,b)=>a-b);
  const heroSeat = seatNums.find(sn => ev.seats[sn].player===ev.hero);
  const layout   = rpBuildLayout(seatNums, heroSeat);
  const bw=96, bh=48;

  seatNums.forEach(sn=>{
    const d      = ev.seats[sn];
    const pos    = layout[sn];
    if(!pos) return;
    const isHero   = d.player===ev.hero;
    const isBtn    = sn===ev.button;
    const isFolded = (ev.folded||[]).includes(d.player);
    const isActive = ev.type==='action' && ev.seat===sn;
    const opacity  = isFolded ? 0.32 : 1;
    const bx=pos.x-bw/2, by=pos.y-bh/2;
    const dir=pos.dir;

    let bg='#161b22', bd='#2d333b', bdW=1;
    if(isHero)   {bg='#0c2416';bd='#3a9e6a';bdW=1.5;}
    if(isActive) {bg='#1c1c08';bd='#c9a84c';bdW=2;}
    if(isActive && ev.is_error && ev.is_hero){bg='#280808';bd='#c0392b';bdW=2;}

    let html=`<g opacity="${opacity}">`;

    // Hero ring branco
    if(isHero){
      html+=`<rect x="${bx-5}" y="${by-5}" width="${bw+10}" height="${bh+10}" rx="11"
                   fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.8"/>`;
    }

    // Cartas — entre o seat e o centro da mesa
    const cw=26, ch=36, cg=3;
    const cardOnTop = dir==='top';
    const cardY  = cardOnTop ? (by+bh+4) : (by-ch-5);
    const showHeroCards = isHero && ev.hero_cards && ev.hero_cards.length===2;

    if(showHeroCards){
      html+=cardSVG(ev.hero_cards[0], pos.x-cw-cg/2, cardY, cw, ch);
      html+=cardSVG(ev.hero_cards[1], pos.x+cg/2,    cardY, cw, ch);
    } else if(!isHero && !isFolded){
      const sw=18, sh=26;
      const sCardY = cardOnTop ? (by+bh+4) : (by-sh-5);
      html+=cardSVG(null, pos.x-sw-2, sCardY, sw, sh, true);
      html+=cardSVG(null, pos.x+2,    sCardY, sw, sh, true);
    }

    // Seat box
    html+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="6"
                 fill="${bg}" stroke="${bd}" stroke-width="${bdW}"/>`;

    // Badge de posição
    if(d.pos){
      const pc={BTN:'#c9a84c',BB:'#c0392b',SB:'#d4763a'}[d.pos]||'#3a5a7a';
      html+=`<rect x="${bx+2}" y="${by+2}" width="26" height="13" rx="3"
                   fill="${pc}22" stroke="${pc}55" stroke-width=".5"/>
             <text x="${bx+15}" y="${by+11}" text-anchor="middle" fill="${pc}"
                   font-family="Share Tech Mono,monospace" font-size="7.5">${d.pos}</text>`;
    }

    // Nome real do jogador
    html+=`<text x="${pos.x}" y="${by+24}" text-anchor="middle"
                 fill="${isHero?'#4caf7d':'#d8d4cc'}"
                 font-family="Rajdhani,sans-serif" font-size="12"
                 font-weight="${isHero?700:500}">${d.player}</text>`;

    // Stack
    const stackVal = (ev.stacks&&ev.stacks[sn]!=null) ? ev.stacks[sn] : d.stack;
    const stackStr = rpShowBB
      ? ((stackVal/bb)<1?(stackVal/bb).toFixed(1):Math.round(stackVal/bb))+'BB'
      : (stackVal>=1000?(stackVal/1000).toFixed(1)+'k':Math.round(stackVal)+'');
    html+=`<text x="${pos.x}" y="${by+38}" text-anchor="middle"
                 fill="${isHero?'#4caf7d88':'#6a6660'}"
                 font-family="Share Tech Mono,monospace" font-size="9">${stackStr}</text>`;

    // Dealer button
    if(isBtn){
      html+=`<circle cx="${bx+bw-5}" cy="${by+5}" r="8" fill="#c9a84c"/>
             <text x="${bx+bw-5}" y="${by+9}" text-anchor="middle"
                   fill="#000" font-family="Rajdhani,sans-serif" font-size="7.5" font-weight="700">D</text>`;
    }

    // Label de ação
    if(isActive && ev.action){
      const ac={folds:'#c0392b',calls:'#4caf7d',raises:'#c9a84c',
                bets:'#c9a84c',checks:'#6a8a6a','all-in':'#ff6666'}[ev.action]||'#6a6660';
      const amtBBs = ev.amount/bb;
      const amtStr = ev.amount>0?(rpShowBB?(amtBBs<1?amtBBs.toFixed(1):Math.round(amtBBs))+'BB':Math.round(ev.amount)+''):'';
      const actLabel = ev.action.toUpperCase()+(amtStr?' '+amtStr:'');
      html+=`<rect x="${pos.x-32}" y="${by+bh+3}" width="64" height="15" rx="4"
                   fill="${ac}22" stroke="${ac}77" stroke-width=".5"/>
             <text x="${pos.x}" y="${by+bh+13}" text-anchor="middle"
                   fill="${ac}" font-family="Share Tech Mono,monospace" font-size="8.5">${actLabel}</text>`;
    }

    html+='</g>';
    seatsG.innerHTML+=html;

    const bet = ev.bets&&ev.bets[sn]>0 ? ev.bets[sn] : 0;
    if(bet>0){
      const cx2=pos.x+(CX-pos.x)*0.42, cy2=pos.y+(CY-pos.y)*0.42;
      const bbs=bet/bb;
      const betStr=rpShowBB?(bbs<1?bbs.toFixed(1):Math.round(bbs))+'BB':bet>=1000?(bet/1000).toFixed(1)+'k':Math.round(bet)+'';
      const chipCol=bet>=bb*10?'#c9a84c':bet>=bb*3?'#c0392b':'#3a7ec9';
      chipsG.innerHTML+=`<circle cx="${cx2}" cy="${cy2}" r="15" fill="${chipCol}" stroke="#ffffff22" stroke-width="1.5"/>
        <circle cx="${cx2}" cy="${cy2}" r="10" fill="none" stroke="#ffffff18" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="${cx2}" y="${cy2+4}" text-anchor="middle" fill="#fff"
          font-family="Share Tech Mono,monospace" font-size="8" font-weight="bold">${betStr}</text>`;
    }
  });
}

// ── Controles ─────────────────────────────────────────────────────────────────
function rpToggle(){
  rpPlaying=!rpPlaying;
  document.getElementById('rp-play').textContent=rpPlaying?'⏸':'▶';
  if(rpPlaying) rpPlayNext(); else clearTimeout(rpTimer);
}
function rpPlayNext(){
  if(!rpPlaying) return;
  if(rpStep>=REPLAY.timeline.length-1){ rpPlaying=false; document.getElementById('rp-play').textContent='▶'; return; }
  rpStep++; rpRender(rpStep);
  rpTimer=setTimeout(rpPlayNext, REPLAY.timeline[rpStep].is_error?rpSpeed*2.5:rpSpeed);
}
function rpFwd(){ clearTimeout(rpTimer);rpPlaying=false;document.getElementById('rp-play').textContent='▶';if(rpStep<REPLAY.timeline.length-1){rpStep++;rpRender(rpStep);} }
function rpBack(){ clearTimeout(rpTimer);rpPlaying=false;document.getElementById('rp-play').textContent='▶';if(rpStep>0){rpStep--;rpRender(rpStep);} }
function rpSeekTo(s){ clearTimeout(rpTimer);rpPlaying=false;document.getElementById('rp-play').textContent='▶';rpStep=s;rpRender(s); }

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') rpFwd();
  if(e.key==='ArrowLeft')  rpBack();
  if(e.key===' '){e.preventDefault();rpToggle();}
  if(e.key==='b') rpToggleBB();
});

// ── Init ──────────────────────────────────────────────────────────────────────
function initReplayer(data){
  REPLAY=data; rpStep=0; _rpLayout=null; _rpStreetMap={};

  document.getElementById('rp-hand-id').textContent='Mão #'+String(data.hand_id).slice(-8);

  // Primar layout com hero na posição inferior
  const ev0=data.timeline[0];
  const sn0=Object.keys(ev0.seats).map(Number).sort((a,b)=>a-b);
  rpBuildLayout(sn0, sn0.find(s=>ev0.seats[s].player===data.hero));

  // Mapear streets → índice inicial
  data.timeline.forEach((ev,i)=>{
    const s=ev.street||'preflop';
    if(_rpStreetMap[s]===undefined) _rpStreetMap[s]=i;
    if(ev.type==='showdown'&&_rpStreetMap['showdown']===undefined) _rpStreetMap['showdown']=i;
  });

  // Ativar tabs das streets presentes
  document.querySelectorAll('.rp-street-btn').forEach(btn=>{
    if(_rpStreetMap[btn.dataset.street]!==undefined){
      btn.classList.remove('rp-st-disabled');
      btn.classList.add('rp-st-available');
    }
  });

  rpRender(0);
}

services:
  - type: web
    name: leaklab-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: LEAKLAB_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: leaklab-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://leaklab.vercel.app  # update to actual frontend domain(s), comma-separated

databases:
  - name: leaklab-db
    plan: free

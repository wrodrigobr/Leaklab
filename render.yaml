services:
  - type: web
    name: leaklab-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: LEAKLAB_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: leaklab-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: leaklab-db
    plan: free

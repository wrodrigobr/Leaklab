name: CI/CD — LeakLab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Testes ────────────────────────────────────────────────────────────────
  test:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r backend/requirements.txt

      - name: Suite GTO — gate de qualidade (zero falhas permitidas)
        working-directory: backend
        run: python3 tests/run_all_tests.py --suite gto

      - name: Rodar suite completa
        working-directory: backend
        run: python3 tests/run_all_tests.py

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: Testes do frontend (vitest — regras de display do card)
        working-directory: frontend
        run: npx vitest run

  # ── Deploy Backend (Render) ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy no Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          deploy_id = data.get('id', data.get('deploy', {}).get('id', '?'))
          status = data.get('status', data.get('deploy', {}).get('status', '?'))
          print(f'Deploy iniciado: id={deploy_id} status={status}')
          "

  # ── Deploy Frontend (Vercel) ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

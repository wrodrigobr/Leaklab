name: CI/CD — LeakLab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Testes ────────────────────────────────────────────────────────────────
  test:
    name: Testes
    runs-on: ubuntu-latest

    # Postgres real p/ o smoke test — pega a classe de bug que o SQLite esconde e o usuário
    # sente em prod (float*Decimal, ROUND(real,int), Decimal/jsonify, HAVING-alias, lastrowid,
    # coluna faltando por migração abortada, text>=timestamp). Cobre funções de analytics/drill/
    # admin/financeiro + sweep HTTP de todas as rotas GET. Gateia os deploys abaixo.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: leaklab
          POSTGRES_PASSWORD: leaklab
          POSTGRES_DB: leaklab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r backend/requirements.txt

      - name: Suite GTO — gate de qualidade (zero falhas permitidas)
        working-directory: backend
        run: python3 tests/run_all_tests.py --suite gto

      - name: Rodar suite completa
        working-directory: backend
        run: python3 tests/run_all_tests.py

      - name: Smoke test em Postgres (classe SQLite↔PG)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://leaklab:leaklab@localhost:5432/leaklab_test
          LEAKLAB_SECRET: ci_smoke_secret_at_least_32_chars_long_xx
        run: python3 tests/test_postgres_smoke.py

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: Testes do frontend (vitest — regras de display do card)
        working-directory: frontend
        run: npx vitest run

  # ── Deploy Backend → Hetzner (Docker, gated nos testes + smoke Postgres) ──────
  # SSH no VPS (projeto em ~/app): git pull + rebuild do serviço `web`. As migrações
  # abort-proof rodam no startup (criam colunas novas em prod). Só roda se o job `test`
  # passar — então o smoke Postgres bloqueia deploy de bug SQLite↔PG.
  # Secrets necessários no repo (Settings → Secrets → Actions):
  #   HETZNER_HOST     IP/host do VPS (ex.: 167.233.139.122)
  #   HETZNER_USER     usuário de deploy (= deploy)
  #   HETZNER_SSH_KEY  chave PRIVADA SSH do usuário deploy (conteúdo do arquivo)
  deploy-backend:
    name: Deploy Backend → Hetzner
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            git pull origin main
            docker compose up -d --build web
            docker image prune -f

  # ── Deploy Frontend → Cloudflare Pages ────────────────────────────────────────
  # SEM job aqui de propósito: o Cloudflare Pages está conectado ao repositório e publica
  # AUTOMATICAMENTE cada push no `main` (build `npm run build`, output `frontend/dist`).
  # O job `test` (vitest) valida o front antes; o build do Cloudflare também falha sozinho
  # se algo quebrar. Importante: por ser git-integration, esse deploy NÃO é bloqueado pelos
  # testes do GitHub Actions. Se quiser gatear o front pelos testes, desligue a integração
  # git do Cloudflare e troque por um job `wrangler pages deploy frontend/dist`.
